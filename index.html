<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <!-- 引入 A-Frame 和 AR.js 的 NFT 版本 -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <title>黄帝内经 AR 测试</title>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <!-- 开启 AR 场景，禁用调试界面 -->
    <a-scene embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">
      
      <!-- NFT 追踪器：指向你上传的那三个文件的路径（不加后缀） -->
      <a-nft
        type="nft"
        url="你的GitHub地址前缀/黄帝内经" 
        smooth="true"
        smoothCount="10"
        smoothTolerance=".01"
        smoothThreshold="5">
        
        <!-- 这里是你想显示的图标。position 是坐标，scale 是缩放 -->
        <a-image 
            src="icon.png" 
            position="0 0 0" 
            rotation="-90 0 0" 
            scale="100 100 100">
        </a-image>

      </a-nft>

      <!-- 静态摄像头 -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
