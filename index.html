<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>黄帝内经 AR 室内测试</title>
    <!-- 使用 unpkg 替代 jsdelivr，国内访问相对稳定 -->
    <script src="https://unpkg.com/aframe@1.2.0/dist/aframe-master.min.js"></script>
    <!-- 使用官方推荐的备用 githack 链接 -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
      /* 增加一个加载提示框，防止白屏让用户以为死机了 */
      .arjs-loader {
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .arjs-loader div {
        text-align: center;
        font-size: 1.25em;
        color: white;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <!-- 加载提示 -->
    <div class="arjs-loader">
      <div>正在加载 AR 模型，请稍候...<br>(请允许使用摄像头)</div>
    </div>

    <!-- 场景设置 -->
    <a-scene
      vr-mode-ui="enabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      embedded
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    >
      <!-- NFT 锚点 -->
      <a-nft
        type="nft"
        url="./data/yellow-emperor"
        smooth="true"
        smoothCount="10"
        smoothTolerance=".01"
        smoothThreshold="5"
      >
        <a-image
          src="./icon.jpg"
          position="0 0 0"
          rotation="-90 0 0"
          scale="100 100 100" 
        ></a-image>
      </a-nft>

      <!-- 静态摄像头 -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
