<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>黄帝内经 AR 室内测试</title>
    <!-- 使用国内最稳定的 CDN 镜像，解决摄像头打不开的问题 -->
    <script src="https://cdn.staticfile.org/aframe/1.2.0/aframe-master.min.js"></script>
    <script src="https://cdn.staticfile.org/ar.js/3.3.2/aframe-ar-nft.js"></script>
    
    <style>
        .arjs-loader {
            height: 100%; width: 100%; position: absolute; top: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.8); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .arjs-loader div { text-align: center; font-size: 1.25em; color: white; font-family: sans-serif; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <!-- 加载遮罩：提示数据正在下载 -->
    <div class="arjs-loader">
        <div>正在初始化 AR 引擎...<br>请确保已允许摄像头权限</div>
    </div>

    <!-- AR 场景主体 -->
    <a-scene
        vr-mode-ui="enabled: false;"
        renderer="logarithmicDepthBuffer: true;"
        embedded
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

        <!-- NFT 锚点：已按照您的要求修改前缀为 yellow-emperor -->
        <a-nft
            type="nft"
            url="./data/yellow-emperor"
            smooth="true"
            smoothCount="10"
            smoothTolerance=".01"
            smoothThreshold="5">
            
            <!-- 虚拟图标：放置在中心，并放大到 600 倍 -->
            <a-image
                src="./icon.png"
                position="0 0 0"
                rotation="-90 0 0"
                scale="600 600 600">
            </a-image>
        </a-nft>

        <!-- 激活摄像头 -->
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // 当识别图数据 (yellow-emperor.fset 等) 加载完成后，自动隐藏黑色遮罩
        window.addEventListener('arjs-nft-loaded', function() {
            document.querySelector('.arjs-loader').style.display = 'none';
        });
    </script>
</body>
</html>
