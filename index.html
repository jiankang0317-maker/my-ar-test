<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>黄帝内经 AR 测试版</title>
    <!-- 使用国内极速镜像引用的脚本 -->
    <script src="https://lib.baomitu.com/aframe/1.2.0/aframe-master.min.js"></script>
    <script src="https://cdn.staticfile.org/ar.js/3.3.2/aframe-ar-nft.js"></script>
    <!-- 调试工具：会在手机右下角出现绿色按钮，点击看报错 -->
    <script src="https://cdn.staticfile.org/eruda/2.4.1/eruda.min.js"></script>
    <script>eruda.init();</script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">
      
      <!-- 注意：url 路径一定要确认能通过浏览器直接访问到 -->
      <a-nft
        type="nft"
        url="./data/yellow-emperor" 
        smooth="true"
        smoothCount="10"
        smoothTolerance=".01"
        smoothThreshold="5">
        
        <!-- 将图标放大，并稍微向上偏移 (position Y 轴) -->
        <a-image 
            src="icon.png" 
            position="0 100 0" 
            rotation="-90 0 0" 
            scale="500 500 500">
        </a-image>

      </a-nft>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
